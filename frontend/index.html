<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title.main">DocTranslate 文档翻译</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>

<body>
  <main class="app-container">
    <header class="app-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>DocTranslate</span>
      </div>
      <div class="header-actions">
        <div id="user-info">
          <span id="user-status" data-i18n="auth.checking">正在检查登录状态...</span>
        </div>
        <div class="language-toggle" data-language-toggle>
          <button type="button" data-language-option="zh">中文</button>
          <span class="toggle-divider">/</span>
          <button type="button" data-language-option="en">English</button>
        </div>
        <a href="https://thisnexus.cn" id="back-to-nexus" data-i18n="auth.backToNexus">
          ← 返回 THIS Nexus
        </a>
        <a href="#" id="logout-link" data-i18n="auth.logout">
          ← 退出登录
        </a>
      </div>
      <p class="subtitle" data-i18n="subtitle.main">无缝文档翻译服务。</p>
    </header>

    <div class="grid-layout">
      <section class="card upload-section">
        <div class="card-header">
          <h2 data-i18n="upload.heading">上传</h2>
        </div>
        <div class="upload-area" id="drop-zone">
          <div class="upload-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <p class="upload-text" data-i18n="upload.cta">拖拽文件到此或点击选择</p>
          <p class="upload-subtext" data-i18n="upload.supported">支持 .pptx, .docx, .xlsx, .pdf</p>
          <input type="file" id="file-input" accept=".pptx,.docx,.xlsx,.pdf" multiple />
        </div>
        <div class="file-queue hidden" id="file-info">
          <ul id="file-queue"></ul>
        </div>
      </section>

      <section class="card settings-section">
        <div class="card-header">
          <h2 data-i18n="settings.heading">设置</h2>
        </div>
        <form id="translation-form">
          <div class="form-group">
            <label for="source-lang" data-i18n="form.source">源语言</label>
            <div class="select-wrapper">
              <select id="source-lang" name="source_lang"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="target-lang" data-i18n="form.target">目标语言</label>
            <div class="select-wrapper">
              <select id="target-lang" name="target_lang" required></select>
            </div>
          </div>
          <div class="form-group">
            <label for="font-name" data-i18n="form.font">字体（可选）</label>
            <input type="text" id="font-name" name="font" list="font-options" placeholder="默认"
              data-i18n="form.fontPlaceholder" data-i18n-attr="placeholder"
              class="text-input" />
            <datalist id="font-options">
              <option value="Arial" label="Arial"></option>
              <option value="Calibri" label="Calibri"></option>
              <option value="Times New Roman" label="Times New Roman"></option>
              <option value="Helvetica" label="Helvetica"></option>
              <option value="Segoe UI" label="Segoe UI"></option>
              <option value="SimSun" label="SimSun"></option>
              <option value="SimHei" label="SimHei"></option>
              <option value="Microsoft YaHei" label="Microsoft YaHei"></option>
              <option value="PingFang SC" label="PingFang SC"></option>
              <option value="Songti SC" label="Songti SC"></option>
              <option value="Noto Sans CJK SC" label="Noto Sans CJK SC"></option>
            </datalist>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="side-by-side" name="side_by_side" />
              <span data-i18n="form.sideBySide">并排翻译（源文 | 译文，逐段对齐）</span>
            </label>
          </div>
          <div class="form-group option-group hidden" id="pdf-output-group">
            <label data-i18n="form.pdfOutputLabel">PDF 输出格式</label>
            <div class="option-grid">
              <label class="radio-card">
                <input type="radio" name="pdf_output_format" value="pdf" checked />
                <span class="option-title" data-i18n="form.pdfOutputPdf">输出为 PDF</span>
                <span class="option-copy" data-i18n="form.pdfOutputPdfCopy">保留 PDF 交付格式，生成翻译后的 PDF。</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="pdf_output_format" value="docx" />
                <span class="option-title" data-i18n="form.pdfOutputDocx">输出为可编辑 DOCX</span>
                <span class="option-copy" data-i18n="form.pdfOutputDocxCopy">把 PDF 中提取的文本整理到可编辑的 Word 文档中。</span>
              </label>
            </div>
          </div>
          <div class="form-group option-group hidden" id="xlsx-output-group">
            <label data-i18n="form.xlsxModeLabel">Excel 翻译方式</label>
            <div class="option-grid">
              <label class="radio-card">
                <input type="radio" name="spreadsheet_mode" value="in_place" checked />
                <span class="option-title" data-i18n="form.xlsxModeInPlace">直接替换原单元格</span>
                <span class="option-copy" data-i18n="form.xlsxModeInPlaceCopy">在原工作表中写回翻译结果。</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="spreadsheet_mode" value="new_sheet" />
                <span class="option-title" data-i18n="form.xlsxModeNewSheet">保留原表并新增翻译表</span>
                <span class="option-copy" data-i18n="form.xlsxModeNewSheetCopy">为每个工作表复制一个翻译版本，放在原表旁边。</span>
              </label>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="translate-btn">
            <span data-i18n="button.translate">开始翻译</span>
          </button>
        </form>
      </section>
    </div>

    <section class="card status-section" id="status-card">
      <div class="status-content">
        <div id="status-message" data-i18n="status.ready">准备好翻译。</div>
        <div class="progress hidden" id="progress-indicator">
          <div class="spinner"></div>
          <span id="progress-text" data-i18n="progress.default">处理中...</span>
        </div>
      </div>
    </section>

    <section class="card downloads-section hidden" id="download-card">
      <div class="card-header">
        <h2 data-i18n="card.completed">已完成</h2>
      </div>
      <ul class="download-list" id="download-list"></ul>
      <div class="failed-summary hidden" id="failed-summary"></div>
    </section>
  </main>

  <script src="i18n.js" defer></script>
  <script src="script.js" defer></script>
</body>

</html>
